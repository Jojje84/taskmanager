<h1>Task List</h1>
<p>Manage your tasks by adding, completing, or deleting them.</p>

<!-- Formulär för att lägga till uppgift -->
<input #taskTitle type="text" placeholder="Enter task title" />
<button (click)="addTask(taskTitle.value)">Add Task</button>

<!-- Lista för att visa uppgifter -->
<ul>
  <li *ngFor="let task of tasks">
    <span [class.completed]="task.completed">{{ task.todo }}</span>
    <button (click)="toggleTaskCompletion(task.id, task.completed)">Toggle Completion</button>
    <button (click)="deleteTask(task.id)">Delete</button>
  </li>
</ul>

<!-- Styling för slutförda uppgifter -->
<style>
  .completed {
    text-decoration: line-through;
  }
</style>
