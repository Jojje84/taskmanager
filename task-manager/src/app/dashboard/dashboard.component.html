<h2>Welcome to Dashboard</h2>


<div class="search">
    <input type="text" placeholder="Search tasks or projects..." />
    <button>Search</button>
  </div>
  
  <div class="stats">
    <div class="stat">
      <h2><i class="fas fa-check-circle"></i></h2>
      <p>Completed Tasks</p>
      <p>{{ completedTasksCount }}</p> <!-- Dynamisk uppdatering av antalet completed tasks -->
    </div>

    <div class="stat">
      <h2><i class="fas fa-times-circle"></i></h2>
         <p>Incomplete Tasks</p>
    <p>{{ incompleteTasksCount }}</p> <!-- Dynamisk uppdatering av antalet incomplete tasks -->
  </div>
  
  <div class="stat">
    <h2><i class="fas fa-clipboard-check"></i></h2>
    <p>To Do</p>
    <p>{{ todoTasksCount }}</p> <!-- Dynamisk uppdatering av antalet todo tasks -->
  </div>
</div>
  
  

  <div class="calendar">
    <h3>Upcoming Deadlines</h3>
    <p>Feature coming soon...</p>
  </div>


<app-project-list></app-project-list>
<app-task-list></app-task-list>
